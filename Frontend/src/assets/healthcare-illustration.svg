<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Background shapes -->
  <circle cx="300" cy="250" r="200" fill="rgba(255,255,255,0.1)"/>
  <circle cx="300" cy="250" r="150" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Stethoscope -->
  <path d="M220 180 C220 140 260 120 300 120 C340 120 380 140 380 180 L380 280" 
        stroke="rgba(255,255,255,0.9)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M220 180 L220 280" 
        stroke="rgba(255,255,255,0.9)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="220" cy="300" r="25" stroke="rgba(255,255,255,0.9)" stroke-width="5" fill="none"/>
  <circle cx="220" cy="300" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="380" cy="300" r="18" fill="rgba(255,255,255,0.9)"/>
  <circle cx="380" cy="300" r="8" fill="#2563eb"/>
  
  <!-- Heart symbol -->
  <path d="M280 350 C280 330 260 310 240 310 C220 310 200 330 200 350 C200 380 240 400 280 430 C320 400 360 380 360 350 C360 330 340 310 320 310 C300 310 280 330 280 350Z" 
        fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  
  <!-- ECG line -->
  <polyline points="120,390 180,390 200,390 220,370 235,410 250,360 265,400 280,390 340,390 400,390 420,390 440,370 455,410 470,390 480,390" 
           stroke="rgba(255,255,255,0.6)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Medical cross -->
  <rect x="430" y="140" width="50" height="16" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="447" y="123" width="16" height="50" rx="4" fill="rgba(255,255,255,0.7)"/>
  
  <!-- Pill capsule -->
  <rect x="100" y="160" width="60" height="24" rx="12" fill="rgba(255,255,255,0.5)" transform="rotate(-30, 130, 172)"/>
  <rect x="130" y="160" width="30" height="24" rx="0 12 12 0" fill="rgba(255,255,255,0.3)" transform="rotate(-30, 130, 172)"/>
  
  <!-- Dots decoration -->
  <circle cx="480" cy="220" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="500" cy="240" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="470" cy="260" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="140" cy="280" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="120" cy="300" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="150" cy="320" r="5" fill="rgba(255,255,255,0.25)"/>
</svg>
